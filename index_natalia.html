<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natália Bomfim de Oliveira · Psicopedagogia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ... Mantive seu CSS original com pequenos ajustes na logo ... */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blush:#f9eef1;
  --rose:#f2c4cf;
  --dusty:#c9849a;
  --wine:#8b3a52;
  --deep:#5c1f32;
  --cream:#fffbfc;
  --text:#3a2530;
  --muted:#8a6670;
}
html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;cursor:none}

.cursor{position:fixed;width:10px;height:10px;background:var(--wine);border-radius:50%;pointer-events:none;z-index:9999;transition:transform .15s ease;mix-blend-mode:multiply}
.cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid var(--dusty);border-radius:50%;pointer-events:none;z-index:9998;transition:all .2s ease;opacity:.6}

nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 56px;
  background:rgba(255,251,252,.92);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(242,196,207,.45);
}
.nav-logo-wrap{display:flex;align-items:center;gap:14px;padding:14px 0;text-decoration:none}

/* Ajuste na classe da logo para melhor nitidez */
.nav-logo{
  width:52px; /* Aumentei levemente para destacar os detalhes do novo design */
  height:52px;
  object-fit:contain; /* Garante que o círculo do logo não seja cortado */
  transition: transform 0.3s ease;
}
.nav-logo:hover {transform: scale(1.05);}

.nav-brand{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;color:var(--wine);display:flex;flex-direction:column;}
.nav-brand small{font-size:0.7rem; letter-spacing: 1px; color: var(--muted); font-weight: 400;}

.nav-links a{font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:10px 16px;border-radius:30px;transition:all .25s}
.nav-links a:hover{color:var(--wine);background:rgba(242,196,207,.25)}

.section-wrap{max-width:1100px;margin:0 auto;padding:96px 56px}
.sobre-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.sobre-photo{width:100%;max-width:380px;height:460px;object-fit:cover;border-radius:28px;box-shadow:0 24px 64px rgba(139,58,82,0.18)}
.sobre-deco-card{position:absolute;bottom:-24px;right:-24px;background:#fff;border-radius:20px;padding:20px 24px;box-shadow:0 12px 36px rgba(139,58,82,0.15);border:1px solid rgba(242,196,207,0.4)}
.sobre-deco-card .big-num{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:600;color:var(--wine);line-height:1}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="mainNav">
  <a class="nav-logo-wrap" href="#">
    <img class="nav-logo" src="logo_redondo.png" alt="Logo Natália Bomfim">
    <div class="nav-brand">Natália Bomfim<small>Psicopedagogia</small></div>
  </a>
  <div class="nav-links">
    <a href="#sobre">Sobre</a>
    <a href="#servicos">Serviços</a>
    <a href="index.html">Blog</a> 
    <a href="#contato" class="nav-cta" style="background: var(--rose); color: var(--wine); padding: 10px 20px; border-radius: 30px; font-weight: 600;">Agendar Consulta</a>
  </div>
</nav>

<section id="sobre" class="sobre-section" style="padding-top: 120px;">
  <div class="section-wrap">
    <div class="sobre-grid">
      <div class="sobre-img-col">
        <div class="sobre-photo-frame" style="position: relative;">
          <img src="foto-perfil.jpg" alt="Natália Bomfim" class="sobre-photo">
          <div class="sobre-deco-card">
            <div class="big-num">3+</div> 
            <div class="small-txt">Anos de Experiência</div>
          </div>
        </div>
      </div>
      <div class="sobre-content">
        <span class="section-eyebrow" style="text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; color: var(--dusty);">Minha Trajetória</span>
        <h2 class="section-title" style="font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: var(--wine); margin: 15px 0;">Dedicação ao <em>Desenvolvimento</em> Infantil</h2>
        <p class="sobre-text" style="line-height: 1.8; color: var(--muted);">Sou psicopedagoga apaixonada por desvendar os caminhos da aprendizagem...</p>
      </div>
    </div>
  </div>
</section>

<script>
const cursor = document.getElementById('cursor');
const cursorRing = document.getElementById('cursorRing');
document.addEventListener('mousemove', (e) => {
    cursor.style.transform = `translate(${e.clientX - 5}px, ${e.clientY - 5}px)`;
    cursorRing.style.transform = `translate(${e.clientX - 18}px, ${e.clientY - 18}px)`;
});
</script>

</body>
</html>
